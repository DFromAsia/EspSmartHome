<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Command Center</title>
    <!-- Google Fonts & FontAwesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">
    <!-- Header / Telemetry -->
    <header class="top-bar glass-panel">
        <div class="brand">
            <i class="fa-solid fa-microchip icon-glow"></i>
            <h1>ESP32 <span>HUB</span></h1>
        </div>
        <div class="telemetry">
            <div class="tel-item"><i class="fa-regular fa-clock"></i> <span id="disp-time" class="mono">--:--</span></div>
            <div class="tel-item"><i class="fa-regular fa-calendar"></i> <span id="disp-date" class="mono">--- --</span></div>
            <div class="tel-item temp"><i class="fa-solid fa-temperature-half"></i> <span id="disp-room-temp" class="mono">--</span>°C</div>
            <div class="tel-item humi"><i class="fa-solid fa-droplet"></i> <span id="disp-room-humi" class="mono">--</span>%</div>
        </div>
    </header>

    <div class="grid-layout">
        
        <!-- LEFT COLUMN -->
        <div class="col">
            
            <!-- CCTV Surveillance -->
            <section class="glass-panel">
                <div class="panel-header">
                    <h2><i class="fa-solid fa-video"></i> CCTV Monitor</h2>
                    <span id="cam-status" class="status-badge offline">Offline</span>
                </div>
                <button id="btn-cctv-toggle" class="btn btn-primary w-100"><i class="fa-solid fa-play"></i> Initialize Stream</button>
                
                <div id="cctv-container" class="cctv-wrapper" style="display: none;">
                    <img id="cctv-stream" src="" alt="Camera Feed">
                    <div class="cctv-controls">
                        <div class="control-row">
                            <label><i class="fa-solid fa-sun"></i> Brightness</label>
                            <input type="range" id="cam-brightness" min="-2" max="2" value="0" step="1">
                        </div>
                        <div class="control-row">
                            <label><i class="fa-solid fa-bolt"></i> Flash</label>
                            <input type="range" id="cam-flash" min="0" max="255" value="0">
                        </div>
                        <div class="btn-group">
                            <button id="btn-h-mirror" class="btn btn-secondary"><i class="fa-solid fa-arrows-left-right"></i> H-Flip</button>
                            <button id="btn-v-mirror" class="btn btn-secondary"><i class="fa-solid fa-arrows-up-down"></i> V-Flip</button>
                        </div>
                    </div>
                </div>
            </section>

        </div>

        <!-- RIGHT COLUMN -->
        <div class="col">
            
            <!-- OLED Display & Messaging -->
            <section class="glass-panel">
                <div class="panel-header">
                    <h2><i class="fa-solid fa-desktop"></i> Matrix Display</h2>
                    <span id="current-face-label" class="status-badge online"></span>
                </div>
                
                <div class="sub-section">
                    <label>Clock Face</label>
                    <div class="btn-group">
                        <button id="btn-analog" class="btn btn-secondary">Analog</button>
                        <button id="btn-digital" class="btn btn-secondary">Digital</button>
                        <button id="btn-info" class="btn btn-secondary">Date & Temp</button>
                    </div>
                </div>

                <div class="sub-section">
                    <label>Push Notification</label>
                    <div class="input-group">
                        <input type="text" id="message-input" placeholder="Type message...">
                        <button id="btn-send-message" class="btn btn-primary"><i class="fa-solid fa-paper-plane"></i></button>
                    </div>
                </div>
            </section>

            <!-- Schedulers: Timer & Alarm -->
            <section class="glass-panel">
                <div class="panel-header">
                    <h2><i class="fa-solid fa-stopwatch"></i> Schedulers</h2>
                </div>

                <div class="sub-section">
                    <label>Countdown Timer</label>
                    <div class="input-group">
                        <input type="number" id="timer-input" placeholder="Seconds" min="1">
                        <button id="btn-timer-start" class="btn btn-success">Start</button>
                    </div>
                </div>

                <div class="sub-section">
                    <label>System Alarm</label>
                    <div class="input-group">
                        <input type="time" id="alarm-time-input">
                        <input type="text" id="alarm-label-input" placeholder="Label...">
                    </div>
                    <div class="btn-group mt-10">
                        <button id="btn-alarm-set" class="btn btn-primary">Set</button>
                        <button id="btn-alarm-clear" class="btn btn-secondary">Clear</button>
                    </div>
                    <div id="alarm-set-status" class="status-text">No active alarms.</div>
                </div>
            </section>

            <!-- RGB Engine -->
            <section class="glass-panel">
                <div class="panel-header">
                    <h2><i class="fa-solid fa-palette"></i> Chroma RGB</h2>
                </div>

                <div class="rgb-controls">
                    <div class="color-picker-wrapper">
                        <input type="color" id="rgb-color" value="#00ffff">
                        <span>Solid Color</span>
                    </div>
                    
                    <button id="btn-rgb-cycle" class="btn btn-success"><i class="fa-solid fa-rotate"></i> Cycle Mode</button>
                    <button id="btn-rgb-off" class="btn btn-danger"><i class="fa-solid fa-lightbulb"></i> Off</button>
                </div>

                <div class="sub-section mt-15">
                    <label>Luminance (Brightness)</label>
                    <input type="range" id="brightness-slider" min="0" max="255" value="128">
                </div>
            </section>

        </div>
    </div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
